name: LLMOps CI

on:
  push:
    branches: [main]
    paths:
      - 'llmops-service/**'
      - '.github/workflows/llmops.yml'
  pull_request:
    branches: [main]
    paths:
      - 'llmops-service/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/retinaxai-llmops

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: llmops-service/requirements.txt

      - name: Install ruff
        run: pip install "ruff>=0.4.0"

      - name: Lint
        working-directory: llmops-service/llmops-service
        run: ruff check app/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: llmops-service/requirements.txt

      - name: Install CI dependencies
        working-directory: llmops-service
        run: pip install -r requirements-ci.txt && pip install --no-deps -e .

      - name: Create test env file
        working-directory: llmops-service/llmops-service
        run: |
          cat > .env << EOF
          APP_ENV=development
          APP_NAME=retinaxai-llmops
          LLM_PROVIDER=mock
          LLM_MODEL=mock-model
          EOF

      - name: Run tests
        working-directory: llmops-service/llmops-service
        run: pytest tests/ -v --tb=short

  build-and-push:
    name: Build and Push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: llmops-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-pr:
    name: Build PR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: llmops-service
          push: false
          cache-from: type=gha
