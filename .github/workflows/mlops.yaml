name: MLOps CI

on:
  push:
    branches: [main]
    paths:
      - 'mlops-service/**'
      - '.github/workflows/mlops.yml'
  workflow_dispatch:
    inputs:
      run_dvc:
        description: 'Run DVC pipeline'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/retinaxai-mlops

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install "ruff>=0.4.0"

      - name: Lint
        working-directory: mlops-service/mlops-service
        run: ruff check app/ monitoring/ main.py

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: mlops-service/requirements-ci.txt

      - name: Install CI dependencies
        working-directory: mlops-service
        run: pip install -r requirements-ci.txt && pip install -e .

      - name: Run tests
        working-directory: mlops-service/mlops-service
        run: pytest tests/ -v --tb=short
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

  build-and-push:
    name: Build and Push Docker image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: mlops-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dvc-pipeline:
    name: DVC Pipeline
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' && inputs.run_dvc == true
    container:
      image: ghcr.io/${{ github.repository_owner }}/retinaxai-mlops:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure DVC remote credentials
        working-directory: mlops-service/mlops-service
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          dvc remote modify dagshub --local auth basic
          dvc remote modify dagshub --local user louayamor
          dvc remote modify dagshub --local password $DAGSHUB_TOKEN

      - name: Pull DVC artifacts
        working-directory: mlops-service/mlops-service
        run: dvc pull --no-run-cache || true

      - name: Run DVC pipeline
        working-directory: mlops-service/mlops-service
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: dvc repro

      - name: Push DVC artifacts
        working-directory: mlops-service/mlops-service
        run: dvc push

      - name: Commit DVC lock file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update dvc.lock after pipeline run"
          file_pattern: dvc.lock

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-metrics
          path: |
            mlops-service/mlops-service/artifacts/model/imaging/metrics.json
            mlops-service/mlops-service/artifacts/model/clinical/metrics.json