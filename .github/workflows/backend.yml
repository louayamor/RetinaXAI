name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend-service/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend-service/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/retinaxai-backend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend-service/requirements.txt

      - name: Install ruff
        run: pip install "ruff>=0.4.0"

      - name: Lint
        working-directory: backend-service/backend-service
        run: ruff check app/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend-service/requirements.txt

      - name: Install dependencies
        working-directory: backend-service
        run: pip install -r requirements.txt

      - name: Create test env file
        working-directory: backend-service/backend-service
        run: |
          cat > .env << EOF
          APP_ENV=development
          APP_NAME=retinaxai-backend
          DATABASE_URL=postgresql+asyncpg://test:test@localhost:5432/test_db
          SECRET_KEY=test-secret-key
          ML_SERVICE_URL=http://localhost:8004
          ML_SERVICE_API_KEY=test-api-key
          LLM_SERVICE_URL=http://localhost:8002
          LLM_SERVICE_API_KEY=test-api-key
          EOF

      - name: Run tests
        working-directory: backend-service/backend-service
        run: pytest tests/ -v --tb=short

  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: backend-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
