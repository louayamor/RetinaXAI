name: security-scan

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  scan-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          version: v0.52.2

      - name: Build images
        run: |
          docker build -t retinaxai-backend ./backend-service
          docker build -t retinaxai-mlops ./mlops-service
          docker build -t retinaxai-llmops ./llmops-service
          docker build -t retinaxai-frontend ./frontend-service

      - name: Scan backend-service
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: retinaxai-backend
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Scan mlops-service
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: retinaxai-mlops
          format: 'sarif'
          output: 'trivy-mlops.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Scan llmops-service
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: retinaxai-llmops
          format: 'sarif'
          output: 'trivy-llmops.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Scan frontend-service
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: retinaxai-frontend
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .
