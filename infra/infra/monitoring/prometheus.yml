# Prometheus configuration for RetinaXAI MLOps monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'mlops-service'
    static_configs:
      - targets: ['mlops-service:9101']
    scrape_interval: 15s
    metrics_path: /metrics

  - job_name: 'backend-service'
    static_configs:
      - targets: ['backend-service:8000']
    scrape_interval: 15s
    metrics_path: /metrics
    params:
      format: ['prometheus']
    
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "rules.yml"

# Remote write configuration (optional - for long-term storage)
# remote_write:
#   - url: "http://elasticsearch:9200/api/v1/namespaces/monitoring/services/prometheus-elasticsearch/writes"
