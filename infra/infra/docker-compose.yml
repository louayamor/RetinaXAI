services:
  postgres:
    image: postgres:16-alpine
    container_name: retinaxai-postgres
    environment:
      POSTGRES_USER: louay
      POSTGRES_PASSWORD: louay
      POSTGRES_DB: retinaxai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U louay"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - retinaxai-network

  redis:
    image: redis:7-alpine
    container_name: retinaxai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - retinaxai-network
    command: redis-server --appendonly yes

  backend-service:
    build:
      context: ../../backend-service
      dockerfile: Dockerfile
    container_name: retinaxai-backend
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://louay:louay@postgres:5432/retinaxai_db
      SECRET_KEY: change-me-in-production
      ML_SERVICE_URL: http://mlops-service:8004
      LLM_SERVICE_URL: http://llmops-service:8002
      ML_SERVICE_API_KEY: ml-api-key
      LLM_SERVICE_API_KEY: llm-api-key
      CORS_ORIGINS: '["http://localhost:3000"]'
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - retinaxai-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  mlops-service:
    build:
      context: ../../mlops-service
      dockerfile: Dockerfile
    container_name: retinaxai-mlops
    environment:
      APP_ENV: production
      MLFLOW_TRACKING_URI: ""
      BACKEND_WS_URL: ws://backend-service:8000/ws
    ports:
      - "8004:8004"
      - "9090:9090"
    volumes:
      - mlops_data:/app/data
      - mlops_artifacts:/app/artifacts
    depends_on:
      - backend-service
      - redis
    networks:
      - retinaxai-network
    command: uvicorn app.api.app:app --host 0.0.0.0 --port 8004

  llmops-service:
    build:
      context: ../../llmops-service
      dockerfile: Dockerfile
    container_name: retinaxai-llmops
    environment:
      APP_ENV: production
      BACKEND_SERVICE_URL: http://backend-service:8000
      BACKEND_WS_URL: ws://backend-service:8000/ws
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama2
    ports:
      - "8002:8002"
    volumes:
      - llmops_data:/app/data
    depends_on:
      - backend-service
      - redis
    networks:
      - retinaxai-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002

  frontend-service:
    build:
      context: ../../frontend-service
      dockerfile: Dockerfile
    container_name: retinaxai-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend-service:8000
      NEXT_PUBLIC_MLOPS_URL: http://mlops-service:8004
    ports:
      - "3002:3000"
    depends_on:
      - backend-service
    networks:
      - retinaxai-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: retinaxai-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - retinaxai-network

  prometheus:
    image: prom/prometheus:latest
    container_name: retinaxai-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert-rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - retinaxai-network
    depends_on:
      - mlops-service

  grafana:
    image: grafana/grafana:latest
    container_name: retinaxai-grafana
    ports:
      - "3003:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - retinaxai-network
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
  postgres_data:
  redis_data:
  backend_data:
  mlops_data:
  mlops_artifacts:
  llmops_data:

networks:
  retinaxai-network:
    driver: bridge