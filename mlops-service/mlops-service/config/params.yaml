training:
  epochs: 20
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0001
  num_workers: 4
  early_stopping_patience: 5
  scheduler: cosine
  num_classes: 5
  dropout: 0.3
  seed: 42

augmentation:
  random_horizontal_flip: true
  random_vertical_flip: true
  random_rotation: 15
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.1
    hue: 0.05
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

evaluation:
  batch_size: 64
  num_workers: 4
  metrics:
    - accuracy
    - quadratic_weighted_kappa
    - classification_report