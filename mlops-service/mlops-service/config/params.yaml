dl_training:
  epochs: 30
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0001
  num_workers: 4
  early_stopping_patience: 5
  scheduler: cosine
  num_classes: 5
  dropout: 0.3
  seed: 42
  freeze_backbone: false

dl_fine_tuning:
  epochs: 20
  batch_size: 8
  learning_rate: 0.001
  weight_decay: 0.0001
  num_workers: 2
  early_stopping_patience: 5
  scheduler: cosine
  num_classes: 5
  dropout: 0.3
  seed: 42
  freeze_backbone: true
  knowledge_distillation: true
  kd_temperature: 4.0
  kd_alpha: 0.7

augmentation:
  random_horizontal_flip: true
  random_vertical_flip: true
  random_rotation: 15
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.1
    hue: 0.05
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

ml_training:
  model: xgboost
  seed: 42
  test_size: 0.2
  xgboost:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    eval_metric: mlogloss
  features:
    numeric:
      - thickness_center_fovea
      - thickness_average_thickness
      - thickness_total_volume_mm3
      - thickness_inner_superior
      - thickness_inner_nasal
      - thickness_inner_inferior
      - thickness_inner_temporal
      - thickness_outer_superior
      - thickness_outer_nasal
      - thickness_outer_inferior
      - thickness_outer_temporal
      - patient_age
    categorical:
      - patient_gender
      - meta_eye
      - clinical_edema
      - clinical_erm_status
      - meta_image_quality
  target: clinical_npdr_grade

evaluation:
  dl:
    batch_size: 64
    num_workers: 4
    metrics:
      - accuracy
      - quadratic_weighted_kappa
      - roc_auc
      - classification_report
  ml:
    metrics:
      - accuracy
      - quadratic_weighted_kappa
      - roc_auc
      - f1_weighted
      - classification_report