stages:
  imaging_ingestion:
    cmd: python main.py --stage ingest --pipeline imaging
    deps:
      - main.py
      - app/components/imaging/data_ingestion.py
      - app/config/configuration.py
      - app/entity/config_entity.py
      - config/config.yaml
    outs:
      - artifacts/data/raw/huggingface/train

  imaging_cleaning:
    cmd: python main.py --stage clean --pipeline imaging
    deps:
      - main.py
      - app/components/imaging/data_cleaning.py
      - app/config/configuration.py
      - config/config.yaml
      - artifacts/data/raw/huggingface/train
    outs:
      - artifacts/data/raw/huggingface/train_clean

  imaging_transformation:
    cmd: python main.py --stage transform --pipeline imaging
    deps:
      - main.py
      - app/components/imaging/data_transformation.py
      - app/config/configuration.py
      - config/config.yaml
      - config/params.yaml
      - config/schema.yaml
      - artifacts/data/raw/huggingface/train_clean
      - artifacts/ocr/output/reports.csv
    outs:
      - artifacts/data/processed/imaging/train.csv
      - artifacts/data/processed/imaging/test.csv
      - artifacts/data/processed/imaging/samaya.csv
      - artifacts/data/processed/imaging/images

  imaging_training:
    cmd: python main.py --stage train --pipeline imaging
    deps:
      - main.py
      - app/components/imaging/model_trainer.py
      - app/config/configuration.py
      - config/config.yaml
      - config/params.yaml
      - artifacts/data/processed/imaging/train.csv
      - artifacts/data/processed/imaging/test.csv
    outs:
      - artifacts/model/imaging/model.pth
    metrics:
      - artifacts/model/imaging/metrics.json:
          cache: false

  imaging_evaluation:
    cmd: python main.py --stage evaluate --pipeline imaging
    deps:
      - main.py
      - app/components/imaging/model_evaluation.py
      - app/config/configuration.py
      - config/config.yaml
      - config/params.yaml
      - artifacts/model/imaging/model.pth
      - artifacts/data/processed/imaging/test.csv
      - artifacts/data/processed/imaging/samaya.csv
    metrics:
      - artifacts/model/imaging/metrics.json:
          cache: false

  clinical_ingestion:
    cmd: python main.py --stage ingest --pipeline clinical
    deps:
      - main.py
      - app/components/clinical/data_ingestion.py
      - app/config/configuration.py
      - config/config.yaml
      - artifacts/ocr/output/reports.csv
    outs:
      - artifacts/data/processed/clinical/raw.csv

  clinical_cleaning:
    cmd: python main.py --stage clean --pipeline clinical
    deps:
      - main.py
      - app/components/clinical/data_cleaning.py
      - app/config/configuration.py
      - config/config.yaml
      - config/schema.yaml
      - artifacts/data/processed/clinical/raw.csv
    outs:
      - artifacts/data/processed/clinical/cleaned.csv

  clinical_transformation:
    cmd: python main.py --stage transform --pipeline clinical
    deps:
      - main.py
      - app/components/clinical/data_transformation.py
      - app/config/configuration.py
      - config/config.yaml
      - config/params.yaml
      - config/schema.yaml
      - artifacts/data/processed/clinical/cleaned.csv
    outs:
      - artifacts/data/processed/clinical/train.csv
      - artifacts/data/processed/clinical/test.csv
      - artifacts/data/processed/clinical/features.json

  clinical_training:
    cmd: python main.py --stage train --pipeline clinical
    deps:
      - main.py
      - app/components/clinical/model_trainer.py
      - app/config/configuration.py
      - config/config.yaml
      - config/params.yaml
      - artifacts/data/processed/clinical/train.csv
      - artifacts/data/processed/clinical/features.json
    outs:
      - artifacts/model/clinical/model.pkl
      - artifacts/model/clinical/feature_importance.json
    metrics:
      - artifacts/model/clinical/metrics.json:
          cache: false

  clinical_evaluation:
    cmd: python main.py --stage evaluate --pipeline clinical
    deps:
      - main.py
      - app/components/clinical/model_evaluation.py
      - app/config/configuration.py
      - config/config.yaml
      - config/params.yaml
      - artifacts/model/clinical/model.pkl
      - artifacts/data/processed/clinical/test.csv
    metrics:
      - artifacts/model/clinical/metrics.json:
          cache: false